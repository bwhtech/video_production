<!doctype html>
<html lang="en" data-resolution="landscape" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

    <!-- frappe-ui design tokens (dark default, violet brand) + Inter -->
    <link rel="stylesheet" href="theme/tokens.css" />
    <link rel="stylesheet" href="theme/fonts.css" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: var(--surface-base);
        font-family: var(--font-text);
      }

      /* ---------- background: dot grid + violet glow ---------- */
      .bg { position: absolute; inset: 0; background: var(--surface-base); }
      .dot-grid { position: absolute; inset: 0; }
      .glow {
        position: absolute; top: 40%; left: 40%;
        width: 760px; height: 760px;
        transform: translate(-50%, -50%);
        border-radius: 9999px;
        /* violet brand glow (was HR green in the Remotion source) */
        background: radial-gradient(circle,
          color-mix(in srgb, var(--brand) 22%, transparent) 0%,
          transparent 70%);
      }

      /* ---------- slanted photo split (right) ---------- */
      .photo-wrap {
        position: absolute; inset: 0; overflow: hidden;
        clip-path: polygon(1050px 0, 1920px 0, 1920px 1080px, 850px 1080px);
        z-index: 2;
      }
      .photo {
        position: absolute; left: 680px; top: 0;
        width: 1400px; height: 1080px;
        object-fit: cover; object-position: center 20%;
      }
      /* fade the photo's left edge into the dark surface (23,23,23 = --surface-base) */
      .photo-fade {
        position: absolute; inset: 0;
        background: linear-gradient(to right,
          rgba(23,23,23,0.92) 0%,
          rgba(23,23,23,0.45) 12%,
          transparent 32%);
      }
      /* violet slant accent line */
      .slant-line {
        position: absolute; inset: 0; z-index: 3;
        clip-path: polygon(1047px 0, 1053px 0, 853px 1080px, 847px 1080px);
        background: var(--brand);
      }

      /* ---------- left content ---------- */
      .content {
        position: absolute; inset: 0; z-index: 4;
        display: flex; align-items: center;
      }
      .content-inner {
        display: flex; flex-direction: column; align-items: flex-start;
        padding-left: 140px; width: 55%;
      }
      .logo { width: 132px; height: 132px; margin-bottom: 40px; }
      .title {
        font-size: 92px; line-height: 1.05;
        font-weight: var(--fw-bold);
        letter-spacing: -0.02em;
        color: var(--ink-gray-9);      /* brightest text on dark */
        margin: 0;
      }
      .title .line { display: block; }
      .chapter {
        margin-top: 40px;
        font-size: 50px; font-weight: var(--fw-semibold);
        color: var(--brand-ink);                 /* light violet text */
        background: var(--brand-subtle);          /* deep violet fill */
        border: 1px solid color-mix(in srgb, var(--brand) 40%, transparent);
        padding: 20px 48px; border-radius: var(--radius-9);
        white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <!-- Reference graphic: thumbnail (static, 1 frame). Ported from the Remotion
         bwh-video Thumbnail, re-themed to frappe-ui dark + violet tokens.
         Edit the two title lines + .chapter text per video. -->
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="1"
      data-fps="30"
      data-width="1920"
      data-height="1080"
    >
      <div class="bg">
        <svg class="dot-grid" width="1920" height="1080">
          <defs>
            <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
              <circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.05)" />
            </pattern>
          </defs>
          <rect width="1920" height="1080" fill="url(#dotGrid)" />
        </svg>
        <div class="glow"></div>
      </div>

      <div class="photo-wrap">
        <img class="photo" src="assets/img/shivam-image.jpeg" alt="" />
        <div class="photo-fade"></div>
      </div>
      <div class="slant-line"></div>

      <div class="content">
        <div class="content-inner">
          <img class="logo" src="assets/img/frappe-hr-logo.svg" alt="" />
          <h1 class="title"><span class="line">Getting Started with</span><span class="line">Frappe HR &amp; Payroll</span></h1>
          <div class="chapter">Chapter 1 &middot; Setup</div>
        </div>
      </div>
    </div>

    <script>
      /* Static thumbnail — no animation, but HF's runtime expects a registered
         paused timeline for the composition id. */
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
